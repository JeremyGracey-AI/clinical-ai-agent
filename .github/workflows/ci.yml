name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dev deps
        run: pip install -e ".[dev]"
      - name: ruff check
        run: ruff check src tests

  test:
    name: Tests (py${{ matrix.python-version }}, quantum=${{ matrix.quantum }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        # quantum=false verifies the graceful cosine fallback path;
        # quantum=true runs the full 42-test suite incl. the Qiskit backend.
        quantum: [false, true]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install (dev only)
        if: ${{ !matrix.quantum }}
        run: pip install -e ".[dev]"
      - name: Install (dev + quantum)
        if: ${{ matrix.quantum }}
        run: pip install -e ".[dev,quantum]"
      - name: Run tests
        run: pytest -q
